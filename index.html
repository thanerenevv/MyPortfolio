<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thantaphat Chatpoj — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== Top bar ===== -->
  <header class="topbar">
    <div class="topbar-inner">
      <a href="#" class="brand" aria-label="Home">
        <span class="brand-mark">TC</span>
      </a>

      <nav class="topbar-nav" aria-label="Primary">
        <a href="#overview">Overview</a>
        <a href="#projects">Projects</a>
        <a href="#awards">Awards</a>
        <a href="#resume">Resume</a>
        <a href="#contact">Contact</a>
      </nav>

      <div class="topbar-search">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true">
          <path d="M11.5 7a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm-.82 4.74a6 6 0 1 1 1.06-1.06l3.04 3.04a.75.75 0 1 1-1.06 1.06l-3.04-3.04Z"/>
        </svg>
        <input type="search" placeholder="Search" aria-label="Search" />
      </div>
    </div>
  </header>

  <!-- ===== Sub navigation (profile tabs) ===== -->
  <div class="subnav">
    <div class="subnav-inner">
      <a href="#overview" class="subnav-item active" data-tab="overview">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0ZM1.5 8a6.5 6.5 0 1 1 13 0 6.5 6.5 0 0 1-13 0Zm4.879-2.773 4.264 2.559a.25.25 0 0 1 0 .428l-4.264 2.559A.25.25 0 0 1 6 10.559V5.442a.25.25 0 0 1 .379-.215Z"/></svg>
        Overview
      </a>
      <a href="#projects" class="subnav-item" data-tab="projects">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8ZM5 12.25a.25.25 0 0 1 .25-.25h3.5a.25.25 0 0 1 .25.25v3.25a.25.25 0 0 1-.4.2l-1.45-1.087a.249.249 0 0 0-.3 0L5.4 15.7a.25.25 0 0 1-.4-.2Z"/></svg>
        Projects
      </a>
      <a href="#awards" class="subnav-item" data-tab="awards">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M8 .75a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 8 .75Zm2.5 1.75v2.5a.75.75 0 0 1-1.5 0V3.43a5.002 5.002 0 0 0-3.51 4.475.75.75 0 0 1-.74.668H2.5a.75.75 0 0 1 0-1.5h.487A6.501 6.501 0 0 1 8 2Z"/></svg>
        Awards
      </a>
      <a href="#resume" class="subnav-item" data-tab="resume">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M0 1.75A.75.75 0 0 1 .75 1h4.253c1.227 0 2.317.59 3 1.501A3.743 3.743 0 0 1 11.006 1h4.245a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75h-4.507a2.25 2.25 0 0 0-1.591.659l-.622.621a.75.75 0 0 1-1.06 0l-.622-.621A2.25 2.25 0 0 0 5.258 13H.75a.75.75 0 0 1-.75-.75Zm7.251 10.324.004-5.073-.002-2.253A2.25 2.25 0 0 0 5.003 2.5H1.5v9h3.757a3.75 3.75 0 0 1 1.994.574ZM8.755 4.75l-.004 7.322a3.752 3.752 0 0 1 1.992-.572H14.5v-9h-3.495a2.25 2.25 0 0 0-2.25 2.25Z"/></svg>
        Resume
      </a>
    </div>
  </div>

  <!-- ===== Main layout ===== -->
  <main class="layout">

    <!-- ===== Profile sidebar ===== -->
    <aside class="profile-card" id="overview">
      <!-- Replace span with: <img src="assets/avatar.jpg" alt="Thantaphat Chatpoj"> -->
      <div class="avatar">
        <span>TC</span>
      </div>

      <h1 class="name">Thantaphat Chatpoj</h1>
      <p class="username"><!-- add a username or nickname, e.g. @tchatpoj --></p>
      <p class="bio"><!-- one or two lines about you --></p>

      <button class="edit-btn" type="button">Edit profile</button>

      <div class="follow-row">
        <a href="#" class="follow-link"><strong>0</strong> <span>followers</span></a>
        <span class="dot">·</span>
        <a href="#" class="follow-link"><strong>0</strong> <span>following</span></a>
      </div>

      <ul class="meta-list">
        <!-- Add one <li> per detail. Examples:
        <li>
          <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M8 1.5a4.5 4.5 0 0 0-4.5 4.5c0 2.5 2 4.5 4.5 7 2.5-2.5 4.5-4.5 4.5-7A4.5 4.5 0 0 0 8 1.5Zm0 6a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z"/></svg>
          Bangkok, Thailand
        </li>
        <li>
          <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M1.75 2h12.5a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75H1.75a.75.75 0 0 1-.75-.75V2.75A.75.75 0 0 1 1.75 2Zm.75 1.5V5h11V3.5h-11Zm0 9h11V6.5h-11v6Z"/></svg>
          your@email.com
        </li>
        <li>
          <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M7.775 3.275a.75.75 0 0 0 1.06 1.06l1.25-1.25a2 2 0 1 0-2.83-2.83l-1.25 1.25a.75.75 0 0 0 1.06 1.06l1.25-1.25a.5.5 0 0 1 .71.71l-1.25 1.25Z"/></svg>
          <a href="#">your-website.com</a>
        </li>
        -->
      </ul>

      <div class="achievements">
        <!-- Achievement badges: drop <img> or <span class="badge"> elements here -->
      </div>

      <div class="orgs">
        <!-- Schools / organizations: small logo <img> elements go here -->
      </div>
    </aside>

    <!-- ===== Main content ===== -->
    <section class="content">

      <!-- ===== Pinned projects ===== -->
      <div class="block" id="projects">
        <h2 class="block-title">Pinned Projects</h2>

        <div class="pinned-grid">
          <!-- Duplicate this card for each project:
          <article class="pin-card">
            <header class="pin-head">
              <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8Z"/></svg>
              <a href="#">project-name</a>
              <span class="pin-public">Public</span>
            </header>
            <p class="pin-desc">One-line description of the project.</p>
            <footer class="pin-foot">
              <span class="lang"><i class="lang-dot" style="background:#f5c518"></i> Language</span>
              <span class="stars">
                <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/></svg>
                0
              </span>
              <span class="forks">
                <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75v-.878a2.25 2.25 0 1 1 1.5 0v.878a2.25 2.25 0 0 1-2.25 2.25h-1.5v2.128a2.251 2.251 0 1 1-1.5 0V8.5h-1.5A2.25 2.25 0 0 1 3.5 6.25v-.878a2.25 2.25 0 1 1 1.5 0ZM5 3.25a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Zm6.75.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm-3 8.75a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Z"/></svg>
                0
              </span>
            </footer>
          </article>
          -->
        </div>
      </div>

      <!-- ===== Activity / contribution graph ===== -->
      <div class="block" id="activity">
        <div class="block-header">
          <h2 class="block-title">Activity</h2>
          <a href="#" class="link-subtle">Contribution settings</a>
        </div>

        <p class="contribution-summary">
          <strong id="contribCount">0</strong> contributions in the last year
        </p>

        <div class="graph-wrap">
          <div class="graph-scroll">
            <div class="months" id="months"></div>
            <div class="graph" id="graph" role="img" aria-label="Activity in the past year"></div>
          </div>

          <div class="legend">
            <span>Less</span>
            <span class="lvl lvl-0"></span>
            <span class="lvl lvl-1"></span>
            <span class="lvl lvl-2"></span>
            <span class="lvl lvl-3"></span>
            <span class="lvl lvl-4"></span>
            <span>More</span>
          </div>
        </div>

        <!-- Recent activity list (optional)
        <div class="activity-list">
          <h3 class="activity-title">Contribution activity</h3>
        </div>
        -->
      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
